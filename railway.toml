# Railway deployment config
# Set region to asia-southeast1 in Railway dashboard: Project Settings > Region
#
# Env vars:
# - PORT: set automatically by Railway
# - DATABASE_URL: from Postgres plugin
# - JWT_SECRET: set in Variables
# - Optional CLIENT_ORIGIN / ORIGIN: only if the browser hits a *different* host than this API
#   (e.g. Angular on Vercel, API on Railway). If this service serves both UI + API, leave unset.

[build]
builder = "nixpacks"

[deploy]
# Schema sync (`prisma db push`) runs once in start.sh — do not duplicate via preDeployCommand
# (avoids an extra short-lived container and duplicate DB work).
# Do NOT run a full Angular build here — Railway expects PORT to accept traffic quickly.
# Build happens in nixpacks.toml [phases.build] (or: npm run build from repo root).
startCommand = "bash start.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
