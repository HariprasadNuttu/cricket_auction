# Railway deployment config
# Set region to asia-southeast1 in Railway dashboard: Project Settings > Region
#
# Env vars:
# - PORT: set automatically by Railway
# - DATABASE_URL: from Postgres plugin
# - JWT_SECRET: set in Variables
# - Optional CLIENT_ORIGIN / ORIGIN: only if the browser hits a *different* host than this API
#   (e.g. Angular on Vercel, API on Railway). If this service serves both UI + API, leave unset.

[build]
builder = "nixpacks"

[deploy]
# Use db push (schema sync), NOT migrate - this project has no migration files
preDeployCommand = "cd server && npx prisma db push --skip-generate || true"
startCommand = "bash start.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
