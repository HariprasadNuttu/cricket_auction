<div class="login-page">
  <div class="login-bg">
    <div class="login-bg-gradient"></div>
    <div class="login-bg-pattern"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo-wrap">
        <img src="assets/logo.png" alt="Cricket Lover's" class="login-logo" />
      </div>

      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Sign in to access the auction</p>

      <form (ngSubmit)="login()" class="login-form">
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            id="email"
            class="form-input"
            [(ngModel)]="email"
            name="email"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            id="password"
            class="form-input"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>

        <div *ngIf="error" class="login-error">
          <i class="bi bi-exclamation-circle"></i>
          {{ error }}
        </div>

        <button type="submit" class="btn-login" [disabled]="!email || !password">
          <span>Sign In</span>
          <i class="bi bi-arrow-right"></i>
        </button>

        <p class="login-register">
          Don't have an account?
          <a routerLink="/register" class="login-link">Register</a>
        </p>
      </form>
    </div>
  </div>
</div>
