<div class="admin-layout">
  <!-- Top Navbar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <div class="d-flex align-items-center">
        <button class="btn btn-link text-white" (click)="toggleSidebar()">
          <i class="bi bi-list"></i>
        </button>
        <span class="navbar-brand mb-0">Cricket Auction System</span>
      </div>
      <div class="d-flex align-items-center" style="gap: 1rem;">
        <span class="text-white">{{ user?.name }}</span>
        <span class="badge bg-info">{{ user?.role }}</span>
        <button class="btn btn-outline-light btn-sm" (click)="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <div class="d-flex">
    <!-- Sidebar -->
    <aside class="sidebar" [class.collapsed]="isSidebarCollapsed">
      <nav class="nav flex-column">
        <a class="nav-link" routerLink="/admin/dashboard" routerLinkActive="active">
          <i class="bi bi-speedometer2"></i>
          <span>Dashboard</span>
        </a>

        <div class="nav-section">
          <div class="nav-section-title">Auction Setup</div>
          
          <a class="nav-link" routerLink="/admin/groups" routerLinkActive="active">
            <i class="bi bi-people"></i>
            <span>Groups</span>
          </a>
          
          <a class="nav-link" routerLink="/admin/seasons" routerLinkActive="active">
            <i class="bi bi-calendar3"></i>
            <span>Seasons</span>
          </a>
          
          <a class="nav-link" routerLink="/admin/teams" routerLinkActive="active">
            <i class="bi bi-trophy"></i>
            <span>Teams</span>
          </a>
          
          <a class="nav-link" routerLink="/admin/players" routerLinkActive="active">
            <i class="bi bi-person"></i>
            <span>Players</span>
          </a>
          
          <a class="nav-link" routerLink="/admin/auction-room" routerLinkActive="active">
            <i class="bi bi-hammer"></i>
            <span>Auction Room</span>
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-section-title">Reports</div>
          
          <a class="nav-link" routerLink="/admin/reports" routerLinkActive="active">
            <i class="bi bi-graph-up"></i>
            <span>Sold Players</span>
          </a>
          
          <a class="nav-link" routerLink="/admin/reports/team-summary" routerLinkActive="active">
            <i class="bi bi-table"></i>
            <span>Team Summary</span>
          </a>
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
