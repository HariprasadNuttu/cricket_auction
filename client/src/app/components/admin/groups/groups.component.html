<div class="groups-container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Groups Management</h2>
    <button class="btn btn-primary" (click)="openCreateModal()">
      <i class="bi bi-plus-circle"></i> Create Group
    </button>
  </div>

  <!-- Groups Table -->
  <div class="card">
    <div class="card-body">
      <table class="table table-hover">
        <thead>
          <tr>
            <th>Group Name</th>
            <th>Description</th>
            <th>Created At</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let group of groups">
            <td><strong>{{ group.name }}</strong></td>
            <td>{{ group.description || '-' }}</td>
            <td>{{ group.createdAt | date:'short' }}</td>
            <td>
              <button class="btn btn-sm btn-info me-2" (click)="viewSeasons(group.id)">
                <i class="bi bi-eye"></i> View Seasons
              </button>
              <button class="btn btn-sm btn-warning me-2" (click)="openEditModal(group)">
                <i class="bi bi-pencil"></i> Edit
              </button>
              <button class="btn btn-sm btn-danger" (click)="deleteGroup(group.id)">
                <i class="bi bi-trash"></i> Delete
              </button>
            </td>
          </tr>
          <tr *ngIf="groups.length === 0">
            <td colspan="4" class="text-center text-muted">No groups found. Create your first group!</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Create Modal -->
  <div class="modal fade" [class.show]="showCreateModal" [style.display]="showCreateModal ? 'flex' : 'none'">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Create Group</h5>
          <button type="button" class="btn-close" (click)="closeModals()"></button>
        </div>
        <div class="modal-body">
          <form>
            <div class="mb-3">
              <label class="form-label">Group Name *</label>
              <input type="text" class="form-control" [(ngModel)]="formData.name" name="name" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea class="form-control" [(ngModel)]="formData.description" name="description" rows="3"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="closeModals()">Cancel</button>
          <button type="button" class="btn btn-primary" (click)="createGroup()">Create</button>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-backdrop fade" [class.show]="showCreateModal" [style.display]="showCreateModal ? 'block' : 'none'" (click)="closeModals()"></div>

  <!-- Edit Modal -->
  <div class="modal fade" [class.show]="showEditModal" [style.display]="showEditModal ? 'flex' : 'none'">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Group</h5>
          <button type="button" class="btn-close" (click)="closeModals()"></button>
        </div>
        <div class="modal-body">
          <form>
            <div class="mb-3">
              <label class="form-label">Group Name *</label>
              <input type="text" class="form-control" [(ngModel)]="formData.name" name="name" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea class="form-control" [(ngModel)]="formData.description" name="description" rows="3"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="closeModals()">Cancel</button>
          <button type="button" class="btn btn-primary" (click)="updateGroup()">Update</button>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-backdrop fade" [class.show]="showEditModal" [style.display]="showEditModal ? 'block' : 'none'" (click)="closeModals()"></div>
</div>
